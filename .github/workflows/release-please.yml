name: Release Please

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ------------------------------------------------------------------ #
  # Release Please — auto PR & changelog from Conventional Commits      #
  # ------------------------------------------------------------------ #
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          token: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------ #
  # Publish to PyPI when a release is created                           #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    environment:
      name: pypi
      url: https://pypi.org/project/apex-restpy/

    permissions:
      id-token: write   # Required for trusted publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses GitHub OIDC trusted publishing.
        # Configure trusted publisher on https://pypi.org/manage/project/apex-restpy/settings/publishing/

  # ------------------------------------------------------------------ #
  # Create GitHub Release assets (attach dist/ files)                  #
  # ------------------------------------------------------------------ #
  upload-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [release-please, publish]
    if: ${{ needs.release-please.outputs.release_created }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Upload dist files to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} dist/* --clobber
